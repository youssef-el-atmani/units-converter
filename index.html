<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Stylesheets -->
    <link rel="stylesheet" href="normalize.css" />
    <link rel="stylesheet" href="style.css" />

    <title>Units Converter</title>
  </head>
  <body>
    <main>
      <section aria-label="units converter">
        <div class="input-section">
          <h1>Metric/Imperial Unit Conversion</h1>
          <input type="number" id="unit-input" />
          <button>Convert</button>
        </div>
        <div class="output-section">
          <div class="length">
            <h2>Length (Meter/Feet)</h2>
            <p>0 meters = 0 feet | 0 feet = 0 meters</p>
          </div>

          <div class="volume">
            <h2>Volume (Liters/Gallons)</h2>
            <p>0 liters = 0 gallons | 0 gallons = 0 liters</p>
          </div>

          <div class="mass">
            <h2>Mass (Kilograms/Pounds)</h2>
            <p>0 kilos = 0 pounds | 0 pounds = 0 kilos</p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
